spring:
  application:
    name: config-server

  profiles:
    # "native" means: read config files from local filesystem/classpath.
    # No git needed. Simple and straightforward.
    active: native

  cloud:
    config:
      server:
        native:
          # Look for service config files inside this classpath folder.
          # So user-service.yml, media-service.yml, etc. sit in resources/configs/
          search-locations: classpath:/configs/

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
